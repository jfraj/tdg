// ============================================================
//  WORLD GENERATOR TOOLKIT (used by the level files)
//  A level can provide a generate() function that builds its
//  map with these helpers — a brand-new world every game!
// ============================================================
const Gen = {

  // A width×height map filled with floor and ringed by wall.
  blank(width, height, floor, wall) {
    const map = [];
    for (let r = 0; r < height; r++) {
      const row = [];
      for (let c = 0; c < width; c++) {
        row.push((r === 0 || r === height - 1 || c === 0 || c === width - 1) ? wall : floor);
      }
      map.push(row);
    }
    return map;
  },

  // Copy a small pattern of tiles into the map at (col, row).
  stamp(map, col, row, pattern) {
    pattern.forEach((prow, dr) => prow.forEach((tile, dc) => {
      map[row + dr][col + dc] = tile;
    }));
  },

  randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  },

  // Is this rectangle — PLUS a one-tile margin all around — pure
  // floor? The margin is the secret to safe random placement:
  // it forces a walkable gap around everything placed, so the
  // decoration can never wall off a passage.
  isClear(map, col, row, w, h, floor) {
    for (let r = row - 1; r <= row + h; r++) {
      for (let c = col - 1; c <= col + w; c++) {
        if (r < 0 || c < 0 || r >= map.length || c >= map[0].length) return false;
        if (map[r][c] !== floor) return false;
      }
    }
    return true;
  },

  // Stamp a pattern at a random clear spot. Returns WHERE it
  // landed ({col, row}), or null if no spot was found in 40
  // tries — important when other things depend on the position!
  placeRandomly(map, pattern, floor) {
    const h = pattern.length, w = pattern[0].length;
    for (let t = 0; t < 40; t++) {
      const col = Gen.randInt(1, map[0].length - 1 - w);
      const row = Gen.randInt(1, map.length - 1 - h);
      if (Gen.isClear(map, col, row, w, h, floor)) {
        Gen.stamp(map, col, row, pattern);
        return { col, row };
      }
    }
    return null;
  },

  // Sprinkle `count` single tiles onto random clear floor cells.
  scatter(map, tile, count, floor) {
    for (let i = 0; i < count; i++) Gen.placeRandomly(map, [[tile]], floor);
  },

  // Temporarily mark cells so nothing random can land on or
  // right next to them; release them again afterwards.
  protect(map, cells) { cells.forEach(([c, r]) => { map[r][c] = -9; }); },
  unprotect(map, cells, floor) {
    cells.forEach(([c, r]) => { if (map[r][c] === -9) map[r][c] = floor; });
  },

  // The safety inspector: starting at `from`, walk (flood-fill)
  // through every walkable tile. Returns true only if EVERY
  // target was reached. Closed doors count as walkable here,
  // because the player can open them.
  allReachable(map, walkables, from, targets) {
    const w = map[0].length, h = map.length;
    const seen = new Set([from.join(',')]);
    const queue = [from];
    while (queue.length > 0) {
      const [c, r] = queue.shift();
      for (const [nc, nr] of [[c + 1, r], [c - 1, r], [c, r + 1], [c, r - 1]]) {
        if (nc < 0 || nr < 0 || nc >= w || nr >= h) continue;
        if (seen.has(nc + ',' + nr)) continue;
        if (!walkables.includes(map[nr][nc])) continue;
        seen.add(nc + ',' + nr);
        queue.push([nc, nr]);
      }
    }
    return targets.every(([c, r]) => seen.has(c + ',' + r));
  },
};

// ============================================================
//  THE PROCEDURAL QUIZ
//  newQuestion() invents a multiplication and three answers.
//  This is the "procedural" part: questions are produced by
//  an algorithm at play time, not typed into a level file.
// ============================================================
// ============================================================
//  QUESTIONS — two possible sources:
//  1) A question bank in questions.js, written by a parent or
//     teacher: { q: "...", a: "...", wrong: ["...", "..."] }.
//     "wrong" is optional — if missing (or too short), wrong
//     answers are borrowed from the OTHER questions' answers,
//     which works well when all questions are about the same
//     topic (e.g. conjugations).
//  2) If there is no usable bank, the game invents kid-style
//     multiplication questions, like the original version.
// ============================================================
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Prepare a bank once at startup: keep only valid entries and
// give each one its pool of possible wrong answers. Used for
// BOTH banks — the doors/dragons one (questions.js) and the
// healing wizard's (wizard-questions.js).
function makeBank(raw) {
  if (!raw || !Array.isArray(raw)) return [];
  const entries = raw.filter(e => e && e.q && e.a);
  return entries
    .map(e => {
      let pool = (e.wrong || []).map(String);
      if (pool.length < 2) {
        // borrow the other questions' answers as distractors
        pool = pool.concat(entries.filter(x => x !== e).map(x => String(x.a)));
      }
      pool = [...new Set(pool)].filter(w => w !== String(e.a));
      return { q: String(e.q), a: String(e.a), pool };
    })
    .filter(e => e.pool.length >= 2); // an entry needs 2 wrong answers
}
const questionBank = makeBank(window.QUESTIONS);
const wizardBank = makeBank(window.WIZARD_QUESTIONS);

function newQuestion(quiz, bank = questionBank) {
  if (bank.length > 0) {
    // ---- A custom question from the bank ----
    let entry;
    do {
      entry = bank[randInt(0, bank.length - 1)];
    } while (bank.length > 1 && entry === quiz.lastEntry);
    quiz.lastEntry = entry; // never the same question twice in a row

    quiz.question = entry.q;
    quiz.correct = entry.a;
    const pool = entry.pool.slice();
    const wrongs = [];
    while (wrongs.length < 2) {
      wrongs.push(pool.splice(randInt(0, pool.length - 1), 1)[0]);
    }
    quiz.answers = [entry.a, wrongs[0], wrongs[1]];
  } else {
    // ---- An invented multiplication (the original mode) ----
    const a = randInt(quiz.min, quiz.max);
    const b = randInt(quiz.min, quiz.max);
    const correct = a * b;
    quiz.question = `${a} × ${b} = ?`;
    quiz.correct = String(correct);

    // Wrong answers that LOOK plausible — the mistakes kids
    // really make: off-by-one-row answers like (a±1)×b.
    const candidates = [
      (a + 1) * b, (a - 1) * b, a * (b + 1), a * (b - 1),
      correct + 1, correct - 1,
    ].filter(n => n > 0 && n !== correct);
    const wrongs = [];
    while (wrongs.length < 2) {
      const pick = candidates[randInt(0, candidates.length - 1)];
      if (!wrongs.includes(pick)) wrongs.push(pick);
    }
    quiz.answers = [quiz.correct, String(wrongs[0]), String(wrongs[1])];
  }

  // Shuffle the three answers onto the three options
  for (let i = quiz.answers.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [quiz.answers[i], quiz.answers[j]] = [quiz.answers[j], quiz.answers[i]];
  }
  quiz.correctIndex = quiz.answers.indexOf(quiz.correct);
}

// Build (or rebuild) the door labels. The question itself goes
// to the banner at the top of the screen (long questions, like
// conjugations, don't fit over the doors).
function setupQuizDisplay(scene, quiz) {
  // The middle label sits higher so long answers never overlap.
  quizDoorLabels = quiz.doors.map((d, i) =>
    scene.add.text(d.col * TILE + TILE / 2,
                   d.row * TILE + TILE / 2 - (i === 1 ? 24 : 0), '', {
      fontFamily: 'Helvetica, Arial', fontSize: '13px', fontStyle: 'bold',
      color: '#ffe9a8', backgroundColor: '#000000aa', padding: { x: 4, y: 1 },
    }).setOrigin(0.5).setDepth(2)
  );

  refreshQuizDisplay(quiz);
}

function refreshQuizDisplay(quiz) {
  showChallengeBanner('quiz', quiz.question);
  quiz.doors.forEach((d, i) => quizDoorLabels[i].setText(quiz.answers[i]));
}

// ----- The question banner -----
// Each kind of challenge has its own icon, action line, and
// colour, so the banner SAYS what it's for — and the same icon
// bobs over the doors/dragons/wizard the question is about, so
// it's clear WHAT to answer.
const CHALLENGE_STYLE = {
  quiz:    { icon: '🚪', action: 'Answer to open the doors',   bg: '#5a3c1cf2', accent: '#ffd98a' },
  dragons: { icon: '🐉', action: 'Answer to calm the dragons', bg: '#5e1f1ff2', accent: '#ff9a9a' },
  wizard:  { icon: '🧙', action: 'Answer to heal  (+1 ♥)',     bg: '#163f1ef2', accent: '#9be9a8' },
};

function setQuestionBanner(text) {
  if (!questionBanner) return;
  questionBanner.setText(text || '');
  questionBanner.setVisible(!!text);
}

// A typed banner: icon + action header on top, the question below.
function showChallengeBanner(type, question) {
  if (!questionBanner) return;
  const s = CHALLENGE_STYLE[type];
  questionBanner.setText(`${s.icon} ${s.action}\n${question}`);
  questionBanner.setBackgroundColor(s.bg);
  questionBanner.setColor('#ffffff');
  questionBanner.setVisible(true);
}

// The bobbing marker: the challenge's icon + a downward arrow,
// hovering just above the thing the question is about.
function setChallengeMarker(scene, type, px, py) {
  if (currentMarkerType === type && challengeMarker) {  // same challenge: just reposition
    challengeMarker.baseY = py;
    challengeMarker.setPosition(px, py);
    return;
  }
  clearChallengeMarker();
  if (!scene) return;
  const s = CHALLENGE_STYLE[type];
  const m = scene.add.text(px, py, `${s.icon}\n▼`, {
    fontFamily: 'Helvetica, Arial', fontSize: '20px', align: 'center',
    color: s.accent, backgroundColor: '#00000066', padding: { x: 5, y: 2 },
  }).setOrigin(0.5, 1).setDepth(6);
  m.baseY = py;
  scene.tweens.add({ targets: m, y: py - 6, duration: 650, yoyo: true, repeat: -1, ease: 'Sine.inOut' });
  challengeMarker = m;
  currentMarkerType = type;
}

function clearChallengeMarker() {
  if (challengeMarker) { challengeMarker.destroy(); challengeMarker = null; }
  currentMarkerType = null;
}

// Hover the marker over a challenge's cluster (middle door, the
// middle dragon, or the wizard himself).
function placeChallengeMarker(scene, type, level) {
  let px, py;
  if (type === 'wizard') {
    if (!wizardSprite) { clearChallengeMarker(); return; }
    px = wizardSprite.x; py = wizardSprite.y - 20;        // above his hat
  } else {
    const ch = type === 'quiz' ? level.quiz : level.dragons;
    const cells = type === 'quiz' ? (ch && ch.doors) : (ch && ch.positions);
    if (!cells || !cells.length) { clearChallengeMarker(); return; }
    const mid = cells[Math.floor(cells.length / 2)];
    // The quiz's middle door label is raised 24px, so the quiz
    // marker sits higher to clear it; dragons have no raised label.
    px = mid.col * TILE + TILE / 2;
    py = mid.row * TILE - (type === 'quiz' ? 24 : 8);
  }
  setChallengeMarker(scene, type, px, py);
}

// Show the current level's unsolved challenge, if any.
// (The wizard's healing question, while one is open, wins.)
function updateBannerForLevel(level) {
  if (wizardActive) {
    showChallengeBanner('wizard', wizardChallenge.question);
    placeChallengeMarker(gameScene, 'wizard', level);
    return;
  }
  if (level.quiz && !level.quiz.solved && level.quiz.question) {
    showChallengeBanner('quiz', level.quiz.question);
    placeChallengeMarker(gameScene, 'quiz', level);
    return;
  }
  if (level.dragons && !level.dragons.solved && level.dragons.question) {
    showChallengeBanner('dragons', level.dragons.question);
    placeChallengeMarker(gameScene, 'dragons', level);
    return;
  }
  setQuestionBanner('');
  clearChallengeMarker();
}

// A solved challenge shows its answer for a moment, then clears.
function celebrateBanner(scene, challenge) {
  questionBanner.setText(`✔  ${challenge.question}  →  ${challenge.correct}`);
  questionBanner.setBackgroundColor('#1e6b2ef2');
  questionBanner.setColor('#ffffff');
  questionBanner.setVisible(true);
  clearChallengeMarker();   // the marker's job is done
  scene.time.delayedCall(3000, () => updateBannerForLevel(LEVELS[currentLevelName]));
}

// ============================================================
//  LOAD LEVEL
// ============================================================
function loadLevel(scene, name, spawn, arriveKey) {
  const level = LEVELS[name];

  // The level's file might be missing from the folder — say so
  // clearly instead of crashing. (This exact bug happened once!)
  if (!level) {
    showMessage(scene, `⚠️ Level "${name}" not found — is its <script> file in the folder?`);
    return;
  }

  // A PREGENERATED world (a snapshot exported with Shift+E,
  // possibly with painted artwork) takes priority over rolling
  // a random one. Several snapshots can be registered per
  // level — one is picked at random, so variety survives.
  if (!level.map && window.WORLDS && window.WORLDS[name] && window.WORLDS[name].length) {
    const pool = window.WORLDS[name];
    applyWorldSnapshot(level, pool[Math.floor(Math.random() * pool.length)]);
  }

  // A level can describe HOW to build itself instead of shipping
  // a fixed map. We build it once per game, then keep it (so an
  // opened door stays open). Refresh the page for a new world!
  if (!level.map && level.generate) {
    level.map = level.generate();
    // Remember the just-born world (before any door opens) so
    // Shift+E can export it at any moment during play.
    level._pristine = makeWorldSnapshot(level);
  }

  // Exits no longer say where you land — the DESTINATION decides.
  // Levels with several incoming portals have NAMED arrivals
  // (e.g. the meadow's "cave" and "sea" gates).
  if (!spawn) {
    spawn = (arriveKey && level.arrivals && level.arrivals[arriveKey])
         || level.arrival || level.start;
  }

  currentLevelName = name;

  if (layer) layer.destroy();
  if (collider) collider.destroy();
  itemSprites.forEach(s => s.destroy());
  itemSprites = [];
  quizDoorLabels.forEach(t => t.destroy());
  quizDoorLabels = [];
  dragonSprites.forEach(s => s.destroy());
  dragonSprites = [];
  dragonLabels.forEach(t => t.destroy());
  dragonLabels = [];
  hazardSprites.forEach(s => s.destroy());
  hazardSprites = [];
  hazardColliders.forEach(c => c.destroy());
  hazardColliders = [];
  if (wizardSprite) { wizardSprite.destroy(); wizardSprite = null; }
  endWizardSession();
  clearChallengeMarker();
  hazardHurtUntil = 0;
  knockback.until = 0;

  const map = scene.make.tilemap({ data: level.map, tileWidth: TILE, tileHeight: TILE });
  const tileset = map.addTilesetImage('tiles');
  layer = map.createLayer(0, tileset, 0, 0);
  layer.setCollision(WALL_TILES);

  // Painted world artwork, if this snapshot has any. The image
  // goes UNDER the tile layer; the tiles then hide themselves
  // except the dynamic ones (doors, portals). Until the image
  // loads — and forever, if it's missing — the classic tiles
  // are what you see. Art is beauty only: collision still comes
  // from the number grid above.
  if (bgImage) { bgImage.destroy(); bgImage = null; }
  if (level._art) attachWorldArt(scene, level, name, map);
  // The third argument is a callback: the physics engine calls
  // it with the EXACT tile the player is bumping into. This is
  // how doors react to being walked into, not walked past.
  collider = scene.physics.add.collider(player, layer, (pl, tile) => {
    handleDoorBump(scene, tile);
  });

  // Items (skipping already-collected ones)
  (level.items || []).forEach(item => {
    if (item.collected) return;
    const sprite = scene.physics.add.sprite(
      item.col * TILE + TILE / 2, item.row * TILE + TILE / 2, item.texture
    );
    sprite.setDepth(1);
    scene.tweens.add({ targets: sprite, y: sprite.y - 4, duration: 700, yoyo: true, repeat: -1 });
    scene.physics.add.overlap(player, sprite, () => {
      item.collected = true;
      state.inventory.push(item.id);
      playCollectEffect(scene, item.id, sprite.x, sprite.y);
      sprite.destroy();
      updateInventoryLabel();
      showMessage(scene, `You picked up the ${item.name}!`);
      // The winning treasure! Let its sparkle play, then celebrate.
      if (item.wins) scene.time.delayedCall(900, () => startVictory(scene));
    });
    itemSprites.push(sprite);
  });

  // Quiz doors, if this level has an unsolved quiz
  if (level.quiz && !level.quiz.solved) {
    if (!level.quiz.answers) newQuestion(level.quiz);
    setupQuizDisplay(scene, level.quiz);
    quizNeedsRetreat = false;
  }

  // Dragon guardians, if this level has them and they're unsolved
  if (level.dragons && !level.dragons.solved) {
    const dragons = level.dragons;
    if (!dragons.answers) newQuestion(dragons);

    dragons.positions.forEach((d, i) => {
      const sprite = scene.physics.add.sprite(
        d.col * TILE + TILE / 2, d.row * TILE + TILE / 2, 'dragon'
      );
      sprite.setDepth(1);
      scene.tweens.add({ targets: sprite, y: sprite.y - 5, duration: 900 + i * 120, yoyo: true, repeat: -1 });

      // The middle label sits higher so long answers never overlap
      const label = scene.add.text(d.col * TILE + TILE / 2,
                                   d.row * TILE - 22 - (i === 1 ? 22 : 0), '', {
        fontFamily: 'Helvetica, Arial', fontSize: '13px', fontStyle: 'bold',
        color: '#ffe9a8', backgroundColor: '#000000aa', padding: { x: 5, y: 1 },
      }).setOrigin(0.5).setDepth(2);

      scene.physics.add.overlap(player, sprite, () => handleDragonTouch(scene, level, i, sprite));
      dragonSprites.push(sprite);
      dragonLabels.push(label);
    });

    refreshDragonDisplay(dragons);
  }

  // Show this level's question (if any) in the banner.
  updateBannerForLevel(level);

  // Moving dangers and the healing wizard, if this level has them.
  if (level.hazards) spawnHazards(scene, level, spawn);
  if (level.wizard) spawnWizard(scene, level, spawn);

  player.setPosition(spawn.col * TILE + TILE / 2, spawn.row * TILE + TILE / 2);
  scene.cameras.main.setBounds(0, 0, map.widthInPixels, map.heightInPixels);
  scene.physics.world.setBounds(0, 0, map.widthInPixels, map.heightInPixels);

  // Tell the screen-filler how big this map is, and refit.
  mapPixelW = map.widthInPixels;
  mapPixelH = map.heightInPixels;
  refit();

  levelLabel.setText(level.name);
  // The atmosphere veil: blue under the sea, and any level can
  // bring its own color (the sky uses warm sunlight).
  if (level.veil) {
    waterOverlay.setFillStyle(level.veil.color, level.veil.alpha);
    waterOverlay.setVisible(true);
  } else {
    waterOverlay.setFillStyle(0x1e5f9e, 0.22);
    waterOverlay.setVisible(!!level.water);
  }
  scene.cameras.main.fadeIn(350);

  // Remember the tile we spawned on, so an exit can never fire
  // until the player has actually walked onto it.
  prevTileKey = `${spawn.col},${spawn.row}`;
}

// ============================================================
//  PREGENERATED WORLDS — snapshots + painted artwork
//
//  The flow: play until you get a world you like, press
//  Shift+E. Two files download: a world-... .js snapshot and a
//  control-... .png layout guide. Feed the control image to an
//  image-generation model (the prompt to use is written inside
//  the .js file), save the result next to index.html under the
//  name the snapshot expects, add the .js to the script list —
//  and that world is now in the game's pool, fully painted.
// ============================================================

// Deep-copy the parts of a level that generate() invented, so
// the world can be rebuilt later exactly as it was born.
function makeWorldSnapshot(level, artName) {
  return JSON.parse(JSON.stringify({
    art: artName || null,
    map: level.map,
    start: level.start,
    arrival: level.arrival,
    arrivals: level.arrivals,
    doors: level.doors,
    exits: level.exits,
    items: (level.items || []).map(it => ({ col: it.col, row: it.row })),
    quiz: level.quiz ? { doors: level.quiz.doors } : null,
    dragons: level.dragons
      ? { positions: level.dragons.positions, opens: level.dragons.opens }
      : null,
  }));
}

// The reverse: pour a snapshot back into a level, resetting all
// progress flags (a fresh game on a familiar world).
function applyWorldSnapshot(level, snap) {
  const s = JSON.parse(JSON.stringify(snap)); // never mutate the original
  level.map = s.map;
  level.start = s.start || level.start;
  level.arrival = s.arrival;
  level.arrivals = s.arrivals;
  level.doors = s.doors || {};
  level.exits = s.exits || {};
  (s.items || []).forEach((it, i) => {
    if (!level.items || !level.items[i]) return;
    level.items[i].col = it.col;
    level.items[i].row = it.row;
    level.items[i].collected = false;
  });
  if (s.quiz && level.quiz) {
    level.quiz.doors = s.quiz.doors;
    level.quiz.answers = null;
    level.quiz.solved = false;
  }
  if (s.dragons && level.dragons) {
    level.dragons.positions = s.dragons.positions;
    level.dragons.opens = s.dragons.opens;
    level.dragons.answers = null;
    level.dragons.solved = false;
  }
  level._art = s.art || null;
}

// Load the painted image (an <img>, for maximum compatibility
// with both GitHub Pages and double-clicked local files) and
// slide it under the tile layer once it's ready.
function attachWorldArt(scene, level, name, map) {
  const texKey = 'world-art-' + level._art;
  const place = () => {
    // The player may have already teleported away while the
    // image was loading — only dress the level we're still in.
    if (currentLevelName !== name || !layer) return;
    bgImage = scene.add.image(0, 0, texKey).setOrigin(0, 0).setDepth(0);
    bgImage.setDisplaySize(map.widthInPixels, map.heightInPixels);
    layer.setDepth(0.5); // tiles render above the artwork...
    layer.forEachTile(t => {       // ...but only the living ones
      t.visible = DYNAMIC_TILES.includes(t.index);
    });
  };
  if (scene.textures.exists(texKey)) { place(); return; }
  const img = new Image();
  img.onload = () => {
    if (!scene.textures.exists(texKey)) scene.textures.addImage(texKey, img);
    place();
  };
  img.onerror = () => {
    console.warn('World artwork "' + level._art + '" not found - using classic tiles.');
  };
  img.src = level._art;
}

// --- Shift+E: export the current world for painting ---
function exportWorld(scene) {
  const level = LEVELS[currentLevelName];
  const snap = level._pristine;
  if (!snap) {
    showMessage(scene, 'This world came from a snapshot - it is already exported!');
    return;
  }
  const id = Date.now().toString(36);
  const artName = `world-${currentLevelName}-${id}.png`;

  // 1) The control image: the map as flat colors, the layout
  //    guide the image model must respect.
  const cv = document.createElement('canvas');
  cv.width = snap.map[0].length * TILE;
  cv.height = snap.map.length * TILE;
  const c2 = cv.getContext('2d');
  snap.map.forEach((row, r) => row.forEach((t, c) => {
    c2.fillStyle = CONTROL_COLORS[t] || '#000000';
    c2.fillRect(c * TILE, r * TILE, TILE, TILE);
  }));
  triggerDownload(`control-${currentLevelName}-${id}.png`, cv.toDataURL('image/png'));

  // 2) The world file: a self-registering snapshot, with the
  //    art prompt and instructions in its header.
  const fileSnap = Object.assign({}, snap, { art: artName });
  triggerDownload(`world-${currentLevelName}-${id}.js`,
    'data:text/javascript;charset=utf-8,'
    + encodeURIComponent(worldFileSource(currentLevelName, id, artName, fileSnap)));

  showMessage(scene, '🗺️ World exported! Check your downloads.');
}

function triggerDownload(filename, href) {
  const a = document.createElement('a');
  a.href = href;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function worldFileSource(levelName, id, artName, snap) {
  const usedTiles = [...new Set(snap.map.flat())].sort((a, b) => a - b);
  const legendNames = {
    0: 'grass meadow',
    1: 'stone wall',
    2: 'portal pad (paint an EMPTY round stone pad - the game animates the portal on top)',
    3: 'cave floor (packed earth)',
    4: 'cave rock wall',
    5: 'OPEN doorway / archway (the game draws the closed door on top until it is unlocked)',
    6: 'house wall (cream plaster with timber)',
    7: 'red shingle roof',
    8: 'house wall with a warm lit window',
    9: 'house wall with a friendly wooden door',
    10: 'leafy tree on grass',
    11: 'warm sand seabed',
    12: 'pink coral reef wall',
    13: 'green seaweed on sand',
    14: 'OPEN doorway / archway (the game draws the closed door on top until it is unlocked)',
    15: 'OPEN doorway / archway (the game draws the closed door on top until it is unlocked)',
    16: 'OPEN doorway / archway (the game draws the closed door on top until it is unlocked)',
    17: 'soft sunlit cloud floor (walkable, high in the sky)',
    18: 'puffy white cumulus cloud bank',
    19: 'small golden star resting on the clouds',
  };
  const legend = usedTiles
    .map(t => `${CONTROL_COLORS[t]} = ${legendNames[t] || 'tile ' + t}`)
    .join('\n');
  return [
    '// ============================================================',
    `//  WORLD SNAPSHOT: ${levelName} (${id}) - exported with Shift+E`,
    '//',
    '//  TO BRING THIS WORLD TO LIFE:',
    '//  1. Open your image-generation tool (Stable Diffusion with',
    '//     ControlNet/img2img follows layouts best; ChatGPT or',
    '//     other image models work too, approximately).',
    `//  2. Give it the control-${levelName}-${id}.png image AND the`,
    '//     prompt below.',
    `//  3. Save the result as:  ${artName}`,
    '//     in the SAME FOLDER as index.html.',
    '//  4. Add this line to index.html, next to the level files:',
    `//       <scr` + `ipt src="world-${levelName}-${id}.js"></scr` + `ipt>`,
    '//  Done - this world (with its painting) joins the random',
    '//  pool. Without the image, it still plays with classic tiles.',
    '//',
    '//  PROMPT TO USE:',
    '/*',
    'Top-down orthographic 2D video game map, cozy cartoon adventure',
    'style, bright and clean, soft shadows, consistent overhead',
    'lighting. Repaint this exact layout, keeping every region in',
    'place and to scale - same proportions as the input image. The',
    'input colors mean:',
    legend,
    'Important: doorway cells must be painted as OPEN passages, and',
    'portal pads as empty stone pads (the game animates doors and',
    'portals on top). No characters, no creatures, no items, no',
    'text, no UI. Rich ground texture and natural variety are',
    'welcome, but walls must stay clearly solid and walkable areas',
    'clearly open.',
    '*/',
    '// ============================================================',
    'window.WORLDS = window.WORLDS || {};',
    `(window.WORLDS['${levelName}'] = window.WORLDS['${levelName}'] || []).push(`,
    JSON.stringify(snap),
    ');',
    '',
  ].join('\n');
}

// ============================================================
//  Door helpers — changing the world
// ============================================================
function openTile(scene, level, col, row, becomes) {
  const t = layer.putTileAt(becomes, col, row);   // change what you see
  level.map[row][col] = becomes;                  // change the data itself
  // Over painted artwork, the new tile (usually plain floor)
  // must hide itself like the other static tiles — the art
  // already shows an open doorway there.
  if (bgImage && t) t.visible = DYNAMIC_TILES.includes(becomes);
}

// ============================================================
//  DOOR BUMP — called by the physics engine every time the
//  player collides with a solid tile. We only care about door
//  tiles (5). tile.x / tile.y are the column / row.
// ============================================================
function handleDoorBump(scene, tile) {
  if (tile.index !== 5 && tile.index !== 14 && tile.index !== 15 && tile.index !== 16) return;

  const level = LEVELS[currentLevelName];
  const key = `${tile.x},${tile.y}`;

  // --- Is it an item-locked door? ---
  const door = level.doors && level.doors[key];
  if (door) {
    if (state.inventory.includes(door.needs)) {
      openTile(scene, level, tile.x, tile.y, door.becomes);
      delete level.doors[key];
      showMessage(scene, door.message || 'The door unlocks!');
    } else if (scene.time.now - lastLockedMsg > 2000) {
      // Pushing on a door we can't open yet — give a hint,
      // but at most once every 2 seconds.
      lastLockedMsg = scene.time.now;
      // The door itself hints at what opens it.
      showMessage(scene,
        tile.index === 16 ? 'A round, pearly socket shimmers in the door... what fits in there?'
      : tile.index === 15 ? 'A gem-shaped hollow glints in the door... something precious would fit there.'
      : tile.index === 14 ? 'A golden keyhole... locked tight. There must be a key somewhere!'
      : "It's locked tight...");
    }
    return;
  }

  // --- Is it one of the quiz doors? ---
  const quiz = level.quiz;
  if (!quiz || quiz.solved) return;
  const idx = quiz.doors.findIndex(d => d.col === tile.x && d.row === tile.y);
  if (idx === -1) return;

  quizLastContact = scene.time.now;
  if (quizNeedsRetreat) return; // still leaning on the doors after a miss

  if (idx === quiz.correctIndex) {
    // Right answer! Open that one door, the quiz is done.
    openTile(scene, level, tile.x, tile.y, quiz.becomes);
    quiz.solved = true;
    clearChallengeMarker();
    showMessage(scene, `Correct! ${quiz.correct}`);
    celebrateBanner(scene, quiz);
    quizDoorLabels[idx].destroy();
  } else {
    // Wrong door: invent a NEW question (procedural!),
    // relabel the doors, and wait for the player to back off.
    showMessage(scene, `${quiz.answers[idx]}? Not quite... here's a new one!`);
    newQuestion(quiz);
    refreshQuizDisplay(quiz);
    quizNeedsRetreat = true;
    scene.cameras.main.shake(150, 0.004); // a little "nope" wobble
  }
}

// ============================================================
//  DRAGONS — touch the GOOD dragon (right answer) to open the
//  way; touch an evil one and it bites: lose a heart, get
//  knocked back, and face a brand-new question.
// ============================================================
function refreshDragonDisplay(dragons) {
  showChallengeBanner('dragons', dragons.question);
  dragons.positions.forEach((d, i) => dragonLabels[i].setText(dragons.answers[i]));
}

function handleDragonTouch(scene, level, i, sprite) {
  const dragons = level.dragons;
  if (dragons.solved) return;
  if (scene.time.now < dragonHurtUntil) return; // just bitten — safe for a moment

  if (i === dragons.correctIndex) {
    // The GOOD dragon! It opens the way.
    dragons.solved = true;
    clearChallengeMarker();
    const o = dragons.opens;
    openTile(scene, level, o.col, o.row, o.becomes);
    showMessage(scene, dragons.message || 'The good dragon bows — the way is open!');
    celebrateBanner(scene, dragons);
    sprite.setTint(0x9effa0); // it glows a friendly green
    dragonLabels[i].destroy();
    // ...and the evil dragons fly away
    dragonSprites.forEach((s, j) => {
      if (j === i) return;
      scene.tweens.add({
        targets: [s, dragonLabels[j]], y: '-=60', alpha: 0, duration: 700,
        onComplete: () => { s.destroy(); dragonLabels[j].destroy(); },
      });
    });
  } else {
    // An EVIL dragon! Chomp.
    sprite.setTint(0xff5555);
    scene.time.delayedCall(500, () => { if (sprite.active) sprite.clearTint(); });

    // Knock the player back, away from the dragon
    const dx = player.x - sprite.x, dy = player.y - sprite.y;
    const len = Math.max(1, Math.hypot(dx, dy));
    knockback = { until: scene.time.now + 220, vx: (dx / len) * 350, vy: (dy / len) * 350 };
    dragonHurtUntil = scene.time.now + 1200;

    // New question, new labels (procedural!)
    newQuestion(dragons);
    refreshDragonDisplay(dragons);

    loseHealth(scene, 'The dragon bites!');
  }
}

// ============================================================
//  MOVING DANGERS — bees, bats, jellyfish... Each level file
//  describes its own in a "hazards" block (texture, how many,
//  speed, message). They wander the map, bouncing off walls
//  and changing direction on a whim. Touch one: lose a heart
//  and get knocked back — then a short safe moment, so a single
//  brush never drains several hearts at once.
// ============================================================

// Find a random open tile, optionally far from a spot and/or
// with room around it for the wizard's three answer orbs: the
// orbs float TWO tiles out (left, right, above), and the cell
// between must be open too, so every orb can be walked to.
function pickWalkableTile(level, opts = {}) {
  const map = level.map;
  const open = (c, r) =>
    r >= 0 && c >= 0 && r < map.length && c < map[0].length &&
    !WALL_TILES.includes(map[r][c]) && map[r][c] !== 2;
  for (let t = 0; t < 300; t++) {
    const col = randInt(1, map[0].length - 2);
    const row = randInt(1, map.length - 2);
    if (!open(col, row)) continue;
    if (opts.awayFrom &&
        Math.hypot(col - opts.awayFrom.col, row - opts.awayFrom.row) < (opts.minDist || 0)) continue;
    if (opts.needsNeighbors &&
        !(open(col - 1, row) && open(col - 2, row) &&
          open(col + 1, row) && open(col + 2, row) &&
          open(col, row - 1) && open(col, row - 2))) continue;
    return { col, row };
  }
  return null;
}

function spawnHazards(scene, level, spawn) {
  const hz = level.hazards;
  const n = Array.isArray(hz.count) ? randInt(hz.count[0], hz.count[1]) : (hz.count || 2);
  for (let i = 0; i < n; i++) {
    // Never right next to where the player appears.
    const at = pickWalkableTile(level, { awayFrom: spawn, minDist: 6 });
    if (!at) continue;
    const s = scene.physics.add.sprite(
      at.col * TILE + TILE / 2, at.row * TILE + TILE / 2, hz.texture);
    s.setDepth(1);
    s.body.setSize(14, 12);            // a forgiving hitbox — kind to kids
    s.setBounce(1, 1);                 // walls send it back the other way
    s.setCollideWorldBounds(true);
    s.setData('nextTurn', 0);          // "pick a new direction" timer
    hazardColliders.push(scene.physics.add.collider(s, layer));
    scene.physics.add.overlap(player, s, () => hazardTouch(scene, level, s));
    // A little hover, so they read as alive even when cornered.
    scene.tweens.add({ targets: s, y: s.y - 3, duration: 380 + i * 60, yoyo: true, repeat: -1 });
    hazardSprites.push(s);
  }
}

function hazardTouch(scene, level, s) {
  if (scene.time.now < hazardHurtUntil) return; // just stung — safe for a moment
  hazardHurtUntil = scene.time.now + 1200;

  // Knock the player back, away from the danger.
  const dx = player.x - s.x, dy = player.y - s.y;
  const len = Math.max(1, Math.hypot(dx, dy));
  knockback = { until: scene.time.now + 240, vx: (dx / len) * 380, vy: (dy / len) * 380 };

  loseHealth(scene, (level.hazards && level.hazards.message) || 'Ouch!');
}

// ============================================================
//  THE HEALING WIZARD — stands somewhere in the level (his home
//  is chosen once per world and kept). Walk up to him while
//  hurt and he asks a question: three answer orbs appear around
//  him. The right orb restores a heart; a wrong one just brings
//  a new question (he's a healer, not a dragon). His questions
//  come from wizard-questions.js — and if that file is missing
//  or empty, he invents multiplications, like the doors do.
// ============================================================
function spawnWizard(scene, level, spawn) {
  const wz = level.wizard;
  // Choose his home once per world: a spot whose left, right,
  // and top neighbours are open — that's where the orbs float.
  if (wz.col === undefined) {
    const at = pickWalkableTile(level, { awayFrom: spawn, minDist: 4, needsNeighbors: true })
            || pickWalkableTile(level, { awayFrom: spawn, minDist: 4 });
    if (!at) return; // no room anywhere? then no wizard this world
    wz.col = at.col; wz.row = at.row;
  }
  wizardSprite = scene.physics.add.sprite(
    wz.col * TILE + TILE / 2, wz.row * TILE + TILE / 2, 'wizard');
  wizardSprite.setDepth(1);
  scene.tweens.add({ targets: wizardSprite, y: wizardSprite.y - 3, duration: 1100, yoyo: true, repeat: -1 });
  scene.physics.add.overlap(player, wizardSprite, () => wizardTouched(scene, level));
}

function wizardTouched(scene, level) {
  if (wizardActive) return;
  if (state.health >= MAX_HEALTH) {
    if (scene.time.now - lastWizardChat > 2500) {
      lastWizardChat = scene.time.now;
      showMessage(scene, (level.wizard && level.wizard.greeting) ||
        'Wizard: You look perfectly healthy, adventurer!');
    }
    return;
  }
  startWizardSession(scene, level);
}

function startWizardSession(scene, level) {
  wizardActive = true;
  // A grace moment: the player is standing right at the wizard
  // when the orbs appear, so the first instant of contact never
  // counts — an answer must be walked to on purpose.
  wizardNeedsRetreat = true;
  wizardLastContact = scene.time.now;
  newQuestion(wizardChallenge, wizardBank);

  const w = level.wizard;
  // Two tiles out: far enough that nobody is already touching
  // one when the question appears.
  const spots = [
    { col: w.col - 2, row: w.row },     // left orb
    { col: w.col,     row: w.row - 2 }, // top orb
    { col: w.col + 2, row: w.row },     // right orb
  ];
  spots.forEach((p, i) => {
    const orb = scene.physics.add.sprite(
      p.col * TILE + TILE / 2, p.row * TILE + TILE / 2, 'fx-glow')
      .setDepth(2).setTint(0xffe08a).setAlpha(0.95).setScale(0.9);
    orb.body.setCircle(11, 5, 5);
    scene.tweens.add({ targets: orb, scale: 1.1, duration: 520 + i * 90, yoyo: true, repeat: -1 });
    scene.physics.add.overlap(player, orb, () => orbTouched(scene, i));
    const label = scene.add.text(
      p.col * TILE + TILE / 2, p.row * TILE - 8, '', {
      fontFamily: 'Helvetica, Arial', fontSize: '13px', fontStyle: 'bold',
      color: '#ffe9a8', backgroundColor: '#000000aa', padding: { x: 5, y: 1 },
    }).setOrigin(0.5).setDepth(2);
    wizardOrbs.push(orb);
    wizardOrbLabels.push(label);
  });

  refreshWizardDisplay();
  showMessage(scene, 'Wizard: Answer well, and I shall heal you!');
}

function refreshWizardDisplay() {
  showChallengeBanner('wizard', wizardChallenge.question);
  placeChallengeMarker(gameScene, 'wizard', LEVELS[currentLevelName]);
  wizardOrbLabels.forEach((l, i) => l.setText(wizardChallenge.answers[i]));
}

function orbTouched(scene, i) {
  if (!wizardActive) return;
  // Being THROWN onto an orb by a sting's knockback is not an
  // answer — the player must walk there on purpose.
  if (scene.time.now < knockback.until) return;
  wizardLastContact = scene.time.now;
  if (wizardNeedsRetreat) return; // still standing on an orb after the last try

  if (i === wizardChallenge.correctIndex) {
    state.health = Math.min(MAX_HEALTH, state.health + 1);
    updateHealthLabel();
    effectHeal(scene, player.x, player.y);
    if (state.health >= MAX_HEALTH) {
      showMessage(scene, 'Wizard: Fully healed — off you go! (+1 ♥)');
      endWizardSession();
      updateBannerForLevel(LEVELS[currentLevelName]);
    } else {
      showMessage(scene, 'Correct! +1 ♥ — another question, another heart!');
      newQuestion(wizardChallenge, wizardBank);
      refreshWizardDisplay();
      wizardNeedsRetreat = true; // step off the orb before the next answer
    }
  } else {
    showMessage(scene, `${wizardChallenge.answers[i]}? Hmm, not quite — try this one!`);
    newQuestion(wizardChallenge, wizardBank);
    refreshWizardDisplay();
    wizardNeedsRetreat = true;
    scene.cameras.main.shake(120, 0.003); // a gentle "hmm" wobble
  }
}

// Quietly remove the orbs and labels (level change, walking
// away, or being fully healed).
function endWizardSession() {
  wizardActive = false;
  wizardNeedsRetreat = false;
  wizardOrbs.forEach(o => o.destroy());
  wizardOrbs = [];
  wizardOrbLabels.forEach(l => l.destroy());
  wizardOrbLabels = [];
}

// A soft green sparkle when a heart comes back.
function effectHeal(scene, x, y) {
  fxRing(scene, x, y, 0x9effa0, 2.0, 500);
  for (let i = 0; i < 8; i++) {
    const star = scene.add.image(x + (Math.random() - 0.5) * 30, y + 8, 'fx-star')
      .setDepth(6).setTint(i % 2 ? 0x9effa0 : 0xe4ffe6)
      .setScale(0.4 + Math.random() * 0.5);
    scene.tweens.add({
      targets: star, y: y - 30 - Math.random() * 30, alpha: 0,
      duration: 600 + Math.random() * 300, delay: i * 60, ease: 'Sine.out',
      onComplete: () => star.destroy(),
    });
  }
}

// ============================================================
//  VICTORY! — collecting the winning treasure (the pearl) fills
//  the whole screen with celebration: a veil, fireworks,
//  confetti rain, the three treasures on display, and a button
//  that builds a BRAND-NEW world to play again. Everything is
//  screen-space (scrollFactor 0), so it covers the full screen
//  wherever the camera happens to be.
// ============================================================
function startVictory(scene) {
  if (victoryActive) return;
  victoryActive = true;

  scene.physics.pause();        // the world holds its breath...
  setQuestionBanner('');
  clearChallengeMarker();
  endWizardSession();

  const w = scene.scale.width, h = scene.scale.height;
  const keep = o => { victoryObjects.push(o); return o; };

  // The veil: night falls over the whole screen.
  const veil = keep(scene.add.rectangle(0, 0, w, h, 0x10142b, 0)
    .setOrigin(0).setScrollFactor(0).setDepth(20));
  scene.tweens.add({ targets: veil, fillAlpha: 0.62, duration: 700 });

  // The title bounces in...
  const title = keep(scene.add.text(w / 2, h * 0.30, '🏆 You win! 🏆', {
    fontFamily: 'Helvetica, Arial', fontSize: '44px', fontStyle: 'bold',
    color: '#ffe9a8', stroke: '#5a3c10', strokeThickness: 8,
  }).setOrigin(0.5).setScrollFactor(0).setDepth(22).setScale(0));
  scene.tweens.add({ targets: title, scale: 1, delay: 250, duration: 650, ease: 'Back.out' });

  // ...with the three treasures of the journey beneath it...
  ['item-key', 'item-gem', 'item-pearl', 'item-star'].forEach((tex, i) => {
    const t = keep(scene.add.image(w / 2 + (i - 1.5) * 52, h * 0.44, tex)
      .setScrollFactor(0).setDepth(22).setScale(0));
    scene.tweens.add({ targets: t, scale: 1.6, delay: 600 + i * 160, duration: 380, ease: 'Back.out' });
    scene.tweens.add({ targets: t, y: t.y - 6, delay: 1000, duration: 800 + i * 130, yoyo: true, repeat: -1 });
  });
  const sub = keep(scene.add.text(w / 2, h * 0.53,
    'The key, the gem, the pearl and the star are yours!', {
    fontFamily: 'Helvetica, Arial', fontSize: '17px',
    color: '#ffffff',
  }).setOrigin(0.5).setScrollFactor(0).setDepth(22).setAlpha(0));
  scene.tweens.add({ targets: sub, alpha: 1, delay: 900, duration: 500 });

  // ...and the way to play again: a brand-new world.
  const btn = keep(scene.add.text(w / 2, h * 0.65, '▶  Play a new world', {
    fontFamily: 'Helvetica, Arial', fontSize: '20px', fontStyle: 'bold',
    color: '#1b2a4a', backgroundColor: '#ffe9a8', padding: { x: 18, y: 10 },
  }).setOrigin(0.5).setScrollFactor(0).setDepth(22).setAlpha(0));
  scene.tweens.add({ targets: btn, alpha: 1, delay: 1300, duration: 400 });
  btn.setInteractive({ useHandCursor: true });
  btn.on('pointerover', () => btn.setBackgroundColor('#fff7d6'));
  btn.on('pointerout',  () => btn.setBackgroundColor('#ffe9a8'));
  btn.on('pointerdown', () => resetGame(scene));
  const hint = keep(scene.add.text(w / 2, h * 0.65 + 34, '(or press Enter)', {
    fontFamily: 'Helvetica, Arial', fontSize: '13px', color: '#c9d2e8',
  }).setOrigin(0.5).setScrollFactor(0).setDepth(22).setAlpha(0));
  scene.tweens.add({ targets: hint, alpha: 0.9, delay: 1500, duration: 400 });
  scene.input.keyboard.once('keydown-ENTER', () => resetGame(scene));

  // Fireworks, forever (each burst cleans itself up)...
  spawnFirework(scene);
  victoryTimers.push(scene.time.addEvent({
    delay: 480, loop: true, callback: () => spawnFirework(scene),
  }));
  // ...and confetti raining over the whole width of the screen.
  victoryTimers.push(scene.time.addEvent({
    delay: 90, loop: true, callback: () => spawnConfetti(scene),
  }));
}

const VICTORY_COLORS = [0xff6b6b, 0xffd23f, 0x9effa0, 0x6bc5ff, 0xc59fff, 0xff9ec4];

function spawnFirework(scene) {
  const w = scene.scale.width, h = scene.scale.height;
  const x = w * (0.08 + Math.random() * 0.84);
  const y = h * (0.10 + Math.random() * 0.45);
  const tint = VICTORY_COLORS[randInt(0, VICTORY_COLORS.length - 1)];

  const ring = scene.add.image(x, y, 'fx-glow')
    .setScrollFactor(0).setDepth(21).setTint(tint).setAlpha(0.9).setScale(0.2);
  scene.tweens.add({
    targets: ring, scale: 2.6, alpha: 0, duration: 550, ease: 'Cubic.out',
    onComplete: () => ring.destroy(),
  });
  for (let i = 0; i < 12; i++) {
    const ang = (i / 12) * Math.PI * 2 + Math.random() * 0.4;
    const dist = 40 + Math.random() * 55;
    const star = scene.add.image(x, y, 'fx-star')
      .setScrollFactor(0).setDepth(21)
      .setTint(i % 3 === 0 ? 0xffffff : tint)
      .setScale(0.5 + Math.random() * 0.6);
    scene.tweens.add({
      targets: star,
      x: x + Math.cos(ang) * dist,
      y: y + Math.sin(ang) * dist + 18, // sparks fall a little
      angle: 90 + Math.random() * 180, scale: 0,
      duration: 600 + Math.random() * 300, ease: 'Cubic.out',
      onComplete: () => star.destroy(),
    });
  }
}

function spawnConfetti(scene) {
  const w = scene.scale.width, h = scene.scale.height;
  for (let i = 0; i < 2; i++) {
    const piece = scene.add.image(Math.random() * w, -12, 'fx-confetti')
      .setScrollFactor(0).setDepth(21)
      .setTint(VICTORY_COLORS[randInt(0, VICTORY_COLORS.length - 1)])
      .setAngle(Math.random() * 360)
      .setScale(0.8 + Math.random() * 0.6);
    scene.tweens.add({         // fall to the bottom of the screen...
      targets: piece, y: h + 16,
      angle: piece.angle + 240 + Math.random() * 360,
      duration: 2300 + Math.random() * 1400, ease: 'Sine.in',
      onComplete: () => piece.destroy(),
    });
    scene.tweens.add({         // ...drifting side to side on the way
      targets: piece, x: '+=' + (Math.random() < 0.5 ? -1 : 1) * (20 + Math.random() * 30),
      duration: 420 + Math.random() * 250, yoyo: true, repeat: 8, ease: 'Sine.inOut',
    });
  }
}

// "Play a new world": every level rebuilds itself from scratch —
// new layouts, new questions, hearts and pockets reset. (Items
// and progress are wiped on purpose: it's a fresh adventure.)
function resetGame(scene) {
  victoryTimers.forEach(t => t.remove());
  victoryTimers = [];
  victoryObjects.forEach(o => o.destroy());
  victoryObjects = [];
  victoryActive = false;
  scene.input.keyboard.off('keydown-ENTER'); // disarm the restart key
  scene.physics.resume();

  state.inventory = [];
  state.health = MAX_HEALTH;
  updateInventoryLabel();
  updateHealthLabel();

  Object.values(LEVELS).forEach(level => {
    level.map = null; // generate() (or a snapshot) will rebuild it
    if (level.wizard) { delete level.wizard.col; delete level.wizard.row; }
  });
  loadLevel(scene, STARTING_LEVEL, LEVELS[STARTING_LEVEL].start);
  showMessage(scene, 'A brand-new world! Find the key...');
}

function loseHealth(scene, why) {
  state.health -= 1;
  updateHealthLabel();
  scene.cameras.main.shake(180, 0.006);
  player.setTint(0xff7777);
  scene.time.delayedCall(600, () => player.clearTint());

  if (state.health <= 0) {
    // Fainted! Wake up at this level's entrance, hearts restored.
    // (Items and progress are kept — we're not monsters.)
    showMessage(scene, 'You fainted! ...waking up at the entrance.');
    state.health = MAX_HEALTH;
    updateHealthLabel();
    loadLevel(scene, currentLevelName, LEVELS[currentLevelName].start);
  } else {
    showMessage(scene, `${why} (${state.health} ♥ left)`);
  }
}

function updateHealthLabel() {
  healthLabel.setText('♥'.repeat(state.health) + '♡'.repeat(MAX_HEALTH - state.health));
}

// ============================================================
//  TOUCH CONTROLS — a translucent D-pad in the bottom-left,
//  for phones and tablets. We don't use button click events;
//  instead, every frame we check which buttons have a finger
//  on them. That way sliding a finger from one arrow to the
//  next changes direction smoothly, like a real gamepad.
// ============================================================
function createTouchControls(scene) {
  scene.input.addPointer(3); // allow several fingers at once

  // One button texture (circle + up arrow), reused 4× rotated
  const g = scene.add.graphics();
  g.fillStyle(0xffffff, 0.22); g.fillCircle(36, 36, 34);
  g.lineStyle(3, 0xffffff, 0.45); g.strokeCircle(36, 36, 34);
  g.fillStyle(0xffffff, 0.8);
  g.fillTriangle(36, 14, 18, 42, 54, 42);
  g.generateTexture('dpad-btn', 72, 72);
  g.destroy();

  const cx = 96, cy = 576 - 96, gap = 58;
  const buttons = [
    { dir: 'up',    x: cx,       y: cy - gap, angle: 0 },
    { dir: 'down',  x: cx,       y: cy + gap, angle: 180 },
    { dir: 'left',  x: cx - gap, y: cy,       angle: -90 },
    { dir: 'right', x: cx + gap, y: cy,       angle: 90 },
  ];
  buttons.forEach(b => {
    b.img = scene.add.image(b.x, b.y, 'dpad-btn')
      .setScrollFactor(0).setDepth(20).setAngle(b.angle);
    b.r = 42; // finger hit radius
    touchButtons.push(b);
  });
  layoutUI(scene); // snap the pad to the current screen size
}

// ============================================================
//  LAYOUT — anchor the HUD and D-pad to the actual screen
//  edges (the screen size changes per device and orientation).
// ============================================================
function layoutUI(scene) {
  if (!levelLabel) return;
  const w = scene.scale.width, h = scene.scale.height;

  levelLabel.setPosition(12, 10);
  healthLabel.setPosition(12, 42);
  inventoryLabel.setPosition(w - 12, 10);
  messageText.setPosition(w / 2, h - 36);

  // The question banner: top-center, dropping below the corner
  // labels on narrow (portrait) screens.
  if (questionBanner) {
    const narrow = w < 430;
    questionBanner.setPosition(w / 2, narrow ? 74 : 10);
    questionBanner.setWordWrapWidth(narrow ? w - 16 : Math.min(520, w - 230));
  }
  if (waterOverlay) waterOverlay.setSize(w, h);

  // The D-pad shrinks a little on narrow screens
  const s = Phaser.Math.Clamp(Math.min(w, h) / 430, 0.7, 1.15);
  const cx = 96 * s, cy = h - 96 * s, gap = 58 * s;
  const spots = {
    up: [cx, cy - gap], down: [cx, cy + gap],
    left: [cx - gap, cy], right: [cx + gap, cy],
  };
  touchButtons.forEach(b => {
    const [x, y] = spots[b.dir];
    b.x = x; b.y = y; b.r = 42 * s;
    b.img.setPosition(x, y).setScale(s);
  });
}

// Which D-pad buttons have a finger on them right now?
function updateTouchState(scene) {
  touch.up = touch.down = touch.left = touch.right = false;
  if (touchButtons.length === 0) return;

  const pointers = [scene.input.pointer1, scene.input.pointer2,
                    scene.input.pointer3, scene.input.pointer4];
  for (const p of pointers) {
    if (!p || !p.isDown) continue;
    for (const b of touchButtons) {
      if (Phaser.Math.Distance.Between(p.x, p.y, b.x, b.y) < b.r) {
        touch[b.dir] = true;
      }
    }
  }
}

// ============================================================
//  COLLECT EFFECTS — every treasure sparkles in its own way.
//  All built from the tiny fx textures + tweens: spawn little
//  images, animate them, destroy them when the tween ends.
//  (Depth 6: above the world and the water veil, below the HUD.)
// ============================================================
function playCollectEffect(scene, id, x, y) {
  if (id === 'gem') effectCrystalShatter(scene, x, y);
  else if (id === 'pearl') effectPearlBubbles(scene, x, y);
  else if (id === 'star') effectRainbowBurst(scene, x, y);
  else effectGoldenBurst(scene, x, y); // the key — and any future item
}

// THE STAR: a rainbow of shooting stars arcing up into the sky.
function effectRainbowBurst(scene, x, y) {
  fxRing(scene, x, y, 0xffffff, 2.4, 500);
  const rainbow = [0xff6b6b, 0xffb24a, 0xffd23f, 0x9effa0, 0x6bc5ff, 0xc59fff];
  for (let i = 0; i < 12; i++) {
    const ang = -Math.PI * (0.15 + Math.random() * 0.7); // mostly upward
    const dist = 36 + Math.random() * 50;
    const star = scene.add.image(x, y, 'fx-star').setDepth(6)
      .setTint(rainbow[i % rainbow.length])
      .setScale(0.6 + Math.random() * 0.6);
    scene.tweens.add({
      targets: star,
      x: x + Math.cos(ang) * dist, y: y + Math.sin(ang) * dist,
      angle: 120 + Math.random() * 240, scale: 0,
      duration: 650 + Math.random() * 300, ease: 'Cubic.out',
      onComplete: () => star.destroy(),
    });
  }
  for (let i = 0; i < 5; i++) {
    const tw = scene.add.image(
      x + (Math.random() - 0.5) * 60, y - Math.random() * 40, 'fx-star'
    ).setDepth(6).setTint(0xffffff).setScale(0);
    scene.tweens.add({
      targets: tw, scale: 0.9, duration: 180, delay: 200 + i * 130,
      yoyo: true, ease: 'Sine.inOut', onComplete: () => tw.destroy(),
    });
  }
}

// A quick expanding ring of light, used by all three.
function fxRing(scene, x, y, tint, scale, duration) {
  const ring = scene.add.image(x, y, 'fx-glow')
    .setDepth(6).setTint(tint).setAlpha(0.85).setScale(0.2);
  scene.tweens.add({
    targets: ring, scale, alpha: 0, duration, ease: 'Cubic.out',
    onComplete: () => ring.destroy(),
  });
}

// THE KEY: a golden starburst with lingering twinkles.
function effectGoldenBurst(scene, x, y) {
  fxRing(scene, x, y, 0xffd700, 2.2, 450);
  for (let i = 0; i < 14; i++) {
    const ang = Math.random() * Math.PI * 2;
    const dist = 28 + Math.random() * 42;
    const star = scene.add.image(x, y, 'fx-star').setDepth(6)
      .setTint(i % 2 ? 0xffd700 : 0xfff3b0)
      .setScale(0.5 + Math.random() * 0.7);
    scene.tweens.add({
      targets: star,
      x: x + Math.cos(ang) * dist, y: y + Math.sin(ang) * dist,
      angle: 90 + Math.random() * 180, scale: 0,
      duration: 550 + Math.random() * 250, ease: 'Cubic.out',
      onComplete: () => star.destroy(),
    });
  }
  for (let i = 0; i < 5; i++) { // twinkle... twinkle...
    const tw = scene.add.image(
      x + (Math.random() - 0.5) * 60, y + (Math.random() - 0.5) * 60, 'fx-star'
    ).setDepth(6).setTint(0xfff7cc).setScale(0).setAngle(Math.random() * 90);
    scene.tweens.add({
      targets: tw, scale: 0.9, duration: 180, delay: 150 + i * 120,
      yoyo: true, ease: 'Sine.inOut', onComplete: () => tw.destroy(),
    });
  }
}

// THE GEM: a crystal shatter — spinning cyan shards and a glint.
function effectCrystalShatter(scene, x, y) {
  scene.cameras.main.flash(180, 120, 235, 225);
  fxRing(scene, x, y, 0x66e0d5, 2.6, 500);
  for (let i = 0; i < 12; i++) {
    const ang = (i / 12) * Math.PI * 2 + Math.random() * 0.4;
    const dist = 35 + Math.random() * 45;
    const shard = scene.add.image(x, y, 'fx-shard').setDepth(6)
      .setTint(i % 3 === 0 ? 0x9ff0e8 : 0x46d6c9)
      .setScale(0.7 + Math.random() * 0.6);
    scene.tweens.add({
      targets: shard,
      x: x + Math.cos(ang) * dist,
      y: y + Math.sin(ang) * dist + 14, // shards fall a little
      angle: (Math.random() < 0.5 ? -1 : 1) * (180 + Math.random() * 360),
      alpha: 0, duration: 650 + Math.random() * 250, ease: 'Quad.out',
      onComplete: () => shard.destroy(),
    });
  }
}

// THE PEARL: pastel sparkles and a plume of rising bubbles.
function effectPearlBubbles(scene, x, y) {
  fxRing(scene, x, y, 0xffe6f2, 1.8, 650);
  const pastels = [0xffffff, 0xffd9ec, 0xd9e8ff, 0xe8d9ff];
  for (let i = 0; i < 6; i++) {
    const tw = scene.add.image(
      x + (Math.random() - 0.5) * 50, y + (Math.random() - 0.5) * 40, 'fx-star'
    ).setDepth(6).setTint(pastels[i % pastels.length]).setScale(0);
    scene.tweens.add({
      targets: tw, scale: 0.8, duration: 220, delay: i * 110,
      yoyo: true, ease: 'Sine.inOut', onComplete: () => tw.destroy(),
    });
  }
  for (let i = 0; i < 9; i++) {
    const b = scene.add.image(x + (Math.random() - 0.5) * 26, y + 6, 'fx-bubble')
      .setDepth(6).setAlpha(0.9).setScale(0.4 + Math.random() * 0.7);
    scene.tweens.add({ // rise and fade...
      targets: b, y: y - 50 - Math.random() * 50, alpha: 0,
      duration: 900 + Math.random() * 500, delay: i * 70, ease: 'Sine.out',
      onComplete: () => b.destroy(),
    });
    scene.tweens.add({ // ...while wobbling side to side
      targets: b, x: '+=' + (Math.random() < 0.5 ? -10 : 10),
      duration: 260, delay: i * 70, yoyo: true, repeat: 3, ease: 'Sine.inOut',
    });
  }
}

// ============================================================
//  UPDATE — runs ~60 times per second
// ============================================================
function update() {
  if (victoryActive) { player.setVelocity(0, 0); return; } // the game is won!
  updateTouchState(this);

  if (this.time.now < knockback.until) {
    // Being pushed back by a dragon bite — controls are ignored briefly
    player.setVelocity(knockback.vx, knockback.vy);
  } else {
    // Each level can set its own speed — swimming is slower!
    const SPEED = LEVELS[currentLevelName].playerSpeed || 160;
    let vx = 0, vy = 0;

    if (keys.left.isDown  || keys.a.isDown || touch.left)  vx = -SPEED;
    if (keys.right.isDown || keys.d.isDown || touch.right) vx =  SPEED;
    if (keys.up.isDown    || keys.w.isDown || touch.up)    vy = -SPEED;
    if (keys.down.isDown  || keys.s.isDown || touch.down)  vy =  SPEED;
    if (vx !== 0 && vy !== 0) { vx *= 0.7071; vy *= 0.7071; }
    player.setVelocity(vx, vy);
  }

  const level = LEVELS[currentLevelName];
  const col = Math.floor(player.x / TILE);
  const row = Math.floor(player.y / TILE);

  // --- The dangers wander: every so often, a new direction ---
  const hzSpeed = (level.hazards && level.hazards.speed) || 70;
  for (const s of hazardSprites) {
    if (this.time.now > s.getData('nextTurn')) {
      const ang = Math.random() * Math.PI * 2;
      s.setVelocity(Math.cos(ang) * hzSpeed, Math.sin(ang) * hzSpeed);
      s.setFlipX(Math.cos(ang) < 0);
      s.setData('nextTurn', this.time.now + randInt(1400, 3200));
    }
  }

  // --- Walking away from the wizard closes his question ---
  if (wizardActive && wizardSprite &&
      Phaser.Math.Distance.Between(player.x, player.y, wizardSprite.x, wizardSprite.y) > TILE * 3.5) {
    endWizardSession();
    updateBannerForLevel(level);
  }
  // After an answer, the player must step off the orb for a
  // moment before the next touch counts (same idea as the doors).
  if (wizardNeedsRetreat && this.time.now - wizardLastContact > 300) {
    wizardNeedsRetreat = false;
  }

  // --- Did we just ENTER a new tile? If it's an exit, travel. ---
  const tileKey = `${col},${row}`;
  if (tileKey !== prevTileKey) {
    prevTileKey = tileKey;
    const exit = level.exits[tileKey];
    if (exit) {
      loadLevel(this, exit.to, null, exit.arrive); // destination picks the landing
      return; // the world just changed — stop this frame here
    }
  }

  // --- Quiz: once the player has stopped pushing on the doors
  // for a moment (300ms), the next attempt is allowed again. ---
  if (quizNeedsRetreat && this.time.now - quizLastContact > 300) {
    quizNeedsRetreat = false;
  }
}

// ============================================================
//  Small helpers for the on-screen text
// ============================================================
function updateInventoryLabel() {
  inventoryLabel.setText(
    state.inventory.length ? 'Carrying: ' + state.inventory.join(', ') : ''
  );
}

function showMessage(scene, text) {
  messageText.setText(text).setAlpha(1);
  scene.tweens.killTweensOf(messageText);
  scene.tweens.add({ targets: messageText, alpha: 0, delay: 2200, duration: 500 });
}
</script>
