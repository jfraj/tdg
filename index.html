<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>My Top-Down Game — Step 4: The Math Doors</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #1a1d23;
    font-family: -apple-system, Helvetica, Arial, sans-serif;
    color: #9aa3b2;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  /* The game area grows to fill the screen; Phaser fits the
     canvas inside it while keeping the aspect ratio. */
  #game {
    flex: 1 1 auto;
    width: 100%;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #hint {
    margin: 6px 0 10px;
    font-size: 13px;
    text-align: center;
    padding: 0 10px;
  }
  canvas {
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    touch-action: none; /* fingers control the game, not page scrolling */
  }
</style>

<!-- The Phaser game engine (needs internet the first time) -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

<!-- Your levels — one file per map, all in the SAME FOLDER -->
<script src="level-home.js"></script>
<script src="level-cave.js"></script>
<script src="level-sea.js"></script>
<script src="level-sky.js"></script>

<!-- OPTIONAL: the question bank, written by a parent or teacher.
     Edit it to teach anything — conjugation, vocabulary,
     capitals... If this file is missing or its list is empty,
     the game falls back to inventing multiplication questions. -->
<script src="questions.js"></script>

<!-- OPTIONNEL : les questions du MAGICIEN GUÉRISSEUR, même
     format que questions.js. S'il manque (ou s'il est vide),
     le magicien invente des multiplications. -->
<script src="wizard-questions.js"></script>

<!-- The SVG tile art — generated once by an AI model, shipped
     as plain strings. The game's code-drawn tiles remain the
     instant fallback if this file is missing or fails. -->
<script src="sprites-svg.js"></script>

<!-- OPTIONAL: pregenerated worlds with painted artwork. Press
     Shift+E in the game to export the current world; follow the
     instructions inside the downloaded world-….js, then list it
     here. Several worlds per level are fine — one is picked at
     random each game. Example:
<script src="world-home-abc123.js"></script>
-->

</head>
<body>

<div id="game"></div>
<div id="hint">Arrows / WASD (or the on-screen pad) — solve the doors, face the dragons... and mind the stingers! The wizard heals those who answer well.</div>

<script>
// ============================================================
//  TILE LEGEND (used by every level file)
//    0 = grass        (walkable)
//    1 = stone wall   (blocks)
//    2 = portal       (walkable — teleports, see "exits")
//    3 = cave floor   (walkable)
//    4 = cave wall    (blocks)
//    5 = question door (blocks — opened by quizzes and dragons)
//    6 = house wall   (blocks — decoration)
//    7 = roof         (blocks — decoration)
//    8 = window       (blocks — decoration)
//    9 = house door   (blocks — decoration, unlike tile 5!)
//   10 = tree         (blocks — decoration)
//   11 = sand         (walkable — sea floor)
//   12 = coral        (blocks — the sea's walls)
//   13 = seaweed      (blocks — decoration)
//   14 = key door     (blocks — its golden keyhole says "find the key")
//   15 = gem door     (blocks — its gem-shaped hollow says "find the gem")
//   16 = pearl door   (blocks — its round pearly socket says "find the pearl")
//   17 = cloud floor  (walkable — the sky's ground)
//   18 = cloud bank   (blocks — the sky's walls)
//   19 = gold star    (blocks — decoration, resting on the clouds)
// ============================================================
const TILE = 32;
const WALL_TILES = [1, 4, 5, 6, 7, 8, 9, 10, 12, 13, 14, 15, 16, 18, 19];

// --- Pregenerated world artwork (see exportWorld below) ---
// When a level uses a painted background image, every tile is
// hidden EXCEPT these: they sit on top of the artwork because
// they change or animate during play (doors open, portals glow).
const DYNAMIC_TILES = [2, 5, 14, 15, 16];
// Flat colors for the exported "control image" — the layout
// guide an image-generation model paints over. One color per
// tile number, chosen to be unambiguous.
const CONTROL_COLORS = {
  0: '#6ab150',  // grass
  1: '#8a8a8a',  // stone wall
  2: '#7b3ff2',  // portal pad
  3: '#5a4632',  // cave floor
  4: '#33302c',  // cave wall
  5: '#b5651d',  // doorway (painted OPEN in the art!)
  6: '#e8d9b4',  // house wall
  7: '#c0392b',  // roof
  8: '#f1c40f',  // window
  9: '#8b5a2b',  // house door
  10: '#1e6b2e', // tree
  11: '#e8d28a', // sand
  12: '#e26a8d', // coral
  13: '#2e8b57', // seaweed
  14: '#d4a017', // key door (painted OPEN in the art!)
  15: '#20b2aa', // gem door (painted OPEN in the art!)
  16: '#dda0dd', // pearl door (painted OPEN in the art!)
  17: '#a8d8f0', // cloud floor
  18: '#fdfdfd', // cloud bank
  19: '#ff8c00', // gold star on cloud
};
const STARTING_LEVEL = 'home';

const MAX_HEALTH = 3;
const state = {
  inventory: [],
  health: MAX_HEALTH,
};

// ------------------------------------------------------------
// If anything crashes, say so on the page instead of silently
// freezing. (A crashed game stops its update loop, which looks
// exactly like a freeze.)
// ------------------------------------------------------------
window.addEventListener('error', (e) => {
  const hint = document.getElementById('hint');
  hint.style.color = '#ff8a8a';
  hint.textContent = '⚠️ Game error: ' + e.message + (e.lineno ? ' (line ' + e.lineno + ')' : '');
});

if (!window.LEVELS || !window.LEVELS[STARTING_LEVEL]) {
  document.getElementById('hint').textContent =
    '⚠️ Level files not found. Put level-home.js and level-cave.js in the same folder as this file.';
  throw new Error('Missing level files');
}

const config = {
  type: Phaser.AUTO,
  parent: 'game',
  pixelArt: true,
  physics: { default: 'arcade' },
  // We size the game ourselves (see refit() below) so it can
  // truly FILL the screen in any orientation, instead of being
  // letterboxed into a fixed shape.
  scale: {
    mode: Phaser.Scale.NONE,
    width: 800,
    height: 576,
  },
  scene: { create, update },
};

const game = new Phaser.Game(config);

// ============================================================
//  FILL THE SCREEN — the canvas takes the whole game area, and
//  a zoom factor is chosen so the camera's view never shows
//  more than the current map: big screens get big chunky
//  pixels, small screens zoom out a little. No empty bars.
// ============================================================
let mapPixelW = 960, mapPixelH = 640; // updated by loadLevel

function refit() {
  const rect = document.getElementById('game').getBoundingClientRect();
  if (rect.width < 50 || rect.height < 50) return;

  // The smallest zoom at which the view still fits inside the map
  const z = Phaser.Math.Clamp(
    Math.max(rect.width / mapPixelW, rect.height / mapPixelH), 0.6, 8);

  game.scale.setZoom(z);
  game.scale.resize(Math.round(rect.width / z), Math.round(rect.height / z));
}

// Phones report their new size a moment AFTER rotating, so we
// re-measure a couple of times once things have settled.
function refitSoon() {
  setTimeout(refit, 100);
  setTimeout(refit, 500);
}
window.addEventListener('resize', refitSoon);
window.addEventListener('orientationchange', refitSoon);

let player, keys;
let layer = null, collider = null;
let bgImage = null; // the painted world artwork, when a level has one
let currentLevelName = null;
let levelLabel, inventoryLabel, messageText, healthLabel;
let itemSprites = [];
// The tile the player was on last frame. Exits fire only when
// ENTERING a tile, so spawning on or near one can't re-trigger.
let prevTileKey = '';

// Dragon guardians
let dragonSprites = [];
let dragonLabels = [];
let dragonHurtUntil = 0; // brief safety period after a bite
// While knocked back by a bite, the keys are ignored briefly
let knockback = { until: 0, vx: 0, vy: 0 };

// Touch D-pad (created only on touch devices)
const touch = { up: false, down: false, left: false, right: false };
let touchButtons = [];
let waterOverlay; // the blue tint for underwater levels

// Quiz display objects (rebuilt whenever a level loads)
let quizDoorLabels = [];
let questionBanner; // the current question, shown at the top of the screen
let gameScene = null;        // set in create(): lets banner helpers reach the scene
let challengeMarker = null;  // the bobbing icon hovering over the active challenge
let currentMarkerType = null;
// After a wrong answer, the player must stop pushing on the
// doors for a moment before the next attempt counts (prevents
// accidental instant re-triggers).
let quizNeedsRetreat = false;
let quizLastContact = 0;   // when we last bumped a quiz door
let lastLockedMsg = -9999; // throttles the "it's locked" message

// Moving dangers (bees, bats, jellyfish — see each level file)
let hazardSprites = [];
let hazardColliders = [];
let hazardHurtUntil = 0;   // brief safety period after a sting

// The healing wizard: answer a question, win a heart back
let wizardSprite = null;
let wizardOrbs = [];       // the three floating answer orbs
let wizardOrbLabels = [];
let wizardActive = false;  // a healing question is on screen
let wizardChallenge = { min: 2, max: 9 }; // the wizard's current question
let wizardNeedsRetreat = false; // step off an orb before the next try
let wizardLastContact = 0;
let lastWizardChat = -9999; // throttles the "you look healthy" line

// The end-of-game celebration
let victoryActive = false;
let victoryObjects = [];   // veil, texts, button, treasures...
let victoryTimers = [];    // the fireworks + confetti loops

// ============================================================
//  CREATE — runs once at startup
// ============================================================
function create() {
  gameScene = this;

  // --- Draw the 6 tiles in code ---
  const tc = this.textures.createCanvas('tiles', TILE * 20, TILE);
  const ctx = tc.context;

  // Tile 0: grass
  ctx.fillStyle = '#5d9c59'; ctx.fillRect(0, 0, TILE, TILE);
  ctx.fillStyle = '#4e8b4a';
  for (let i = 0; i < 10; i++)
    ctx.fillRect(Math.floor(Math.random() * 28), Math.floor(Math.random() * 28), 3, 3);

  // Tile 1: stone wall
  ctx.fillStyle = '#5b6470'; ctx.fillRect(TILE, 0, TILE, TILE);
  ctx.fillStyle = '#6e7886'; ctx.fillRect(TILE + 3, 3, TILE - 6, TILE - 6);
  ctx.fillStyle = '#49515b'; ctx.fillRect(TILE + 3, TILE - 8, TILE - 6, 5);

  // Tile 2: portal
  ctx.fillStyle = '#241b3d'; ctx.fillRect(TILE * 2, 0, TILE, TILE);
  ctx.strokeStyle = '#b08ae8'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(TILE * 2 + 16, 16, 9, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#e6d6ff';
  ctx.beginPath(); ctx.arc(TILE * 2 + 16, 16, 3, 0, Math.PI * 2); ctx.fill();

  // Tile 3: cave floor
  ctx.fillStyle = '#4a4036'; ctx.fillRect(TILE * 3, 0, TILE, TILE);
  ctx.fillStyle = '#3e362d';
  for (let i = 0; i < 8; i++)
    ctx.fillRect(TILE * 3 + Math.floor(Math.random() * 28), Math.floor(Math.random() * 28), 3, 3);

  // Tile 4: cave wall
  ctx.fillStyle = '#2c3038'; ctx.fillRect(TILE * 4, 0, TILE, TILE);
  ctx.fillStyle = '#3a3f48'; ctx.fillRect(TILE * 4 + 3, 3, TILE - 6, TILE - 6);
  ctx.fillStyle = '#22262c'; ctx.fillRect(TILE * 4 + 3, TILE - 8, TILE - 6, 5);

  // Tile 5: QUESTION door — quizzes and dragons open it, so its
  // plaque shows a "?": answers are the key here.
  ctx.fillStyle = '#7a4f26'; ctx.fillRect(TILE * 5, 0, TILE, TILE);
  ctx.fillStyle = '#8e5f30';
  ctx.fillRect(TILE * 5 + 3, 2, 7, 28); ctx.fillRect(TILE * 5 + 13, 2, 7, 28); ctx.fillRect(TILE * 5 + 23, 2, 7, 28);
  ctx.fillStyle = '#5a3c1c'; ctx.fillRect(TILE * 5 + 9, 9, 14, 14);
  ctx.fillStyle = '#ffe9a8';
  ctx.font = 'bold 13px Helvetica, Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', TILE * 5 + 16, 16.5);

  // Tile 6: house wall — cream plaster with timber beams
  let o = TILE * 6;
  ctx.fillStyle = '#ecdcb4'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#8a6b48';
  ctx.fillRect(o, 0, TILE, 3);             // top beam
  ctx.fillRect(o, TILE - 3, TILE, 3);      // bottom beam
  ctx.fillRect(o, 0, 3, TILE);             // left beam
  ctx.fillRect(o + TILE - 3, 0, 3, TILE);  // right beam

  // Tile 7: roof — red shingles with a sunlit ridge
  o = TILE * 7;
  ctx.fillStyle = '#b5523c'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#9c4431';
  for (let y = 7; y < TILE; y += 8) ctx.fillRect(o, y, TILE, 2);
  ctx.fillStyle = '#c96450'; ctx.fillRect(o, 0, TILE, 3);

  // Tile 8: window — house wall with a glass window
  o = TILE * 8;
  ctx.fillStyle = '#ecdcb4'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#8a6b48'; ctx.fillRect(o, TILE - 3, TILE, 3);
  ctx.fillStyle = '#6b5236'; ctx.fillRect(o + 7, 6, 18, 16);   // frame
  ctx.fillStyle = '#a7d3ee'; ctx.fillRect(o + 9, 8, 14, 12);   // glass
  ctx.fillStyle = '#6b5236';
  ctx.fillRect(o + 15, 8, 2, 12); ctx.fillRect(o + 9, 13, 14, 2); // crossbars

  // Tile 9: house door — a friendly arched door. Decoration
  // only! The LOCKED gameplay door is still tile 5.
  o = TILE * 9;
  ctx.fillStyle = '#ecdcb4'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#7a5230';
  ctx.fillRect(o + 9, 12, 14, 20);
  ctx.beginPath(); ctx.arc(o + 16, 13, 7, Math.PI, 0); ctx.fill(); // arch
  ctx.fillStyle = '#9c7048'; ctx.fillRect(o + 15, 10, 2, 22);      // plank line
  ctx.fillStyle = '#e8c860';
  ctx.beginPath(); ctx.arc(o + 20, 22, 2, 0, Math.PI * 2); ctx.fill(); // handle

  // Tile 10: tree — leafy canopy over grass
  o = TILE * 10;
  ctx.fillStyle = '#5d9c59'; ctx.fillRect(o, 0, TILE, TILE);   // grass behind
  ctx.fillStyle = '#6b4a2f'; ctx.fillRect(o + 13, 20, 6, 11);  // trunk
  ctx.fillStyle = '#3e7d3a';
  ctx.beginPath(); ctx.arc(o + 16, 13, 12, 0, Math.PI * 2); ctx.fill(); // canopy
  ctx.fillStyle = '#4f9447';
  ctx.beginPath(); ctx.arc(o + 12, 10, 6, 0, Math.PI * 2); ctx.fill();  // light spots
  ctx.beginPath(); ctx.arc(o + 20, 15, 5, 0, Math.PI * 2); ctx.fill();

  // Tile 11: sand — warm speckled seabed (walkable)
  o = TILE * 11;
  ctx.fillStyle = '#d8c389'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#c4ae74';
  for (let i = 0; i < 10; i++)
    ctx.fillRect(o + Math.floor(Math.random() * 28), Math.floor(Math.random() * 28), 3, 2);

  // Tile 12: coral — a pink reef chunk on sand
  o = TILE * 12;
  ctx.fillStyle = '#d8c389'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#e2607a';
  ctx.beginPath(); ctx.arc(o + 10, 20, 8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(o + 22, 16, 9, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(o + 16, 26, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f08a9e';
  ctx.beginPath(); ctx.arc(o + 20, 12, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(o + 8, 13, 3, 0, Math.PI * 2); ctx.fill();

  // Tile 13: seaweed — wavy green strands on sand
  o = TILE * 13;
  ctx.fillStyle = '#d8c389'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.strokeStyle = '#3f8f5a'; ctx.lineWidth = 3;
  for (const sx of [8, 16, 24]) {
    ctx.beginPath(); ctx.moveTo(o + sx, 30);
    ctx.quadraticCurveTo(o + sx + 5, 20, o + sx - 2, 12);
    ctx.quadraticCurveTo(o + sx - 6, 6, o + sx + 2, 2);
    ctx.stroke();
  }

  // Tile 14: KEY door — the golden keyhole hints at the Golden
  // Key. Matching lock and key!
  o = TILE * 14;
  ctx.fillStyle = '#7a4f26'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#8e5f30';
  ctx.fillRect(o + 3, 2, 7, 28); ctx.fillRect(o + 13, 2, 7, 28); ctx.fillRect(o + 23, 2, 7, 28);
  ctx.fillStyle = '#e8c860';
  ctx.fillRect(o + 2, 4, 28, 3); ctx.fillRect(o + 2, 25, 28, 3);     // golden bands
  ctx.beginPath(); ctx.arc(o + 16, 15, 6.5, 0, Math.PI * 2); ctx.fill(); // golden plate
  ctx.fillStyle = '#2b1d0e';
  ctx.beginPath(); ctx.arc(o + 16, 13.5, 2.5, 0, Math.PI * 2); ctx.fill(); // keyhole
  ctx.beginPath(); ctx.moveTo(o + 14.8, 14.5); ctx.lineTo(o + 17.2, 14.5);
  ctx.lineTo(o + 18, 19.5); ctx.lineTo(o + 14, 19.5); ctx.closePath(); ctx.fill();

  // Tile 15: GEM door — a gem-shaped hollow, the exact silhouette
  // of the Cave Gem, rimmed with its cyan glint.
  o = TILE * 15;
  ctx.fillStyle = '#8e3d52'; ctx.fillRect(o, 0, TILE, TILE);       // coral stone
  ctx.fillStyle = '#a84e66';
  ctx.fillRect(o + 2, 2, 13, 13); ctx.fillRect(o + 17, 2, 13, 13); // stone slabs
  ctx.fillRect(o + 2, 17, 13, 13); ctx.fillRect(o + 17, 17, 13, 13);
  ctx.fillStyle = '#1d0f16';                                       // the recess
  ctx.beginPath(); ctx.moveTo(o + 16, 6); ctx.lineTo(o + 24, 14);
  ctx.lineTo(o + 16, 26); ctx.lineTo(o + 8, 14); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#46d6c9'; ctx.lineWidth = 2;                  // cyan glint rim
  ctx.beginPath(); ctx.moveTo(o + 16, 6); ctx.lineTo(o + 24, 14);
  ctx.lineTo(o + 16, 26); ctx.lineTo(o + 8, 14); ctx.closePath(); ctx.stroke();
  ctx.fillStyle = '#9ff0e8';                                       // tiny sparkles
  ctx.fillRect(o + 25, 4, 2, 2); ctx.fillRect(o + 5, 26, 2, 2);

  // Tile 16: PEARL door — a round, pearly socket: the exact
  // silhouette of the Sea Pearl, shimmering at the rim.
  o = TILE * 16;
  ctx.fillStyle = '#6f7bb5'; ctx.fillRect(o, 0, TILE, TILE);       // sky stone
  ctx.fillStyle = '#8590c9';
  ctx.fillRect(o + 2, 2, 13, 13); ctx.fillRect(o + 17, 2, 13, 13); // stone slabs
  ctx.fillRect(o + 2, 17, 13, 13); ctx.fillRect(o + 17, 17, 13, 13);
  ctx.fillStyle = '#1d2038';                                       // the recess
  ctx.beginPath(); ctx.arc(o + 16, 16, 8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#f8f4ec'; ctx.lineWidth = 2;                  // pearly rim
  ctx.beginPath(); ctx.arc(o + 16, 16, 8, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#ffd9ec'; ctx.fillRect(o + 25, 4, 2, 2);        // iridescent
  ctx.fillStyle = '#d9e8ff'; ctx.fillRect(o + 5, 26, 2, 2);        // glints

  // Tile 17: cloud floor — soft sunlit cloud (walkable)
  o = TILE * 17;
  ctx.fillStyle = '#dceefb'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.ellipse(o + 9, 10, 8, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(o + 23, 23, 7, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#c2ddf2';
  ctx.fillRect(o + 5, 26, 3, 2); ctx.fillRect(o + 26, 7, 3, 2);

  // Tile 18: cloud bank — puffy cumulus (the sky's walls)
  o = TILE * 18;
  ctx.fillStyle = '#b8d4ea'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#e9f3fb';
  ctx.beginPath(); ctx.arc(o + 9, 22, 8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(o + 22, 24, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(o + 10, 10, 7.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(o + 22, 8, 6.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(o + 16, 16, 8, 0, Math.PI * 2); ctx.fill();

  // Tile 19: a small golden star resting on the clouds
  o = TILE * 19;
  ctx.fillStyle = '#dceefb'; ctx.fillRect(o, 0, TILE, TILE);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.ellipse(o + 16, 25, 9, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffd23f';
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const r = i % 2 ? 3.2 : 7.5;
    ctx[i ? 'lineTo' : 'moveTo'](o + 16 + Math.cos(a) * r, 15 + Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff3b0'; ctx.fillRect(o + 13, 11, 2, 2);

  tc.refresh();

  // --- Upgrade the tiles to the SVG art (sprites-svg.js) ---
  // Repaints the 'tiles' canvas in place once the browser has
  // rasterized the SVGs; until then (and if it ever fails) the
  // code-drawn tiles above are what you see.
  if (window.SvgTiles) SvgTiles.install(this, 'tiles', TILE);

  // --- Draw the player ---
  let g = this.add.graphics();
  g.fillStyle(0x3568b8); g.fillRoundedRect(4, 10, 16, 13, 4);
  g.fillStyle(0xf2c9a1); g.fillCircle(12, 8, 6);
  g.fillStyle(0x222222); g.fillRect(9, 6, 2, 3); g.fillRect(13, 6, 2, 3);
  g.generateTexture('player', 24, 24);
  g.destroy();

  // --- Draw the item pickups ---
  g = this.add.graphics();
  g.fillStyle(0xf5c542);
  g.fillCircle(7, 8, 5);
  g.fillStyle(0x1a1d23); g.fillCircle(7, 8, 2);
  g.fillStyle(0xf5c542);
  g.fillRect(10, 7, 10, 3);
  g.fillRect(16, 10, 2, 4); g.fillRect(19, 10, 2, 5);
  g.generateTexture('item-key', 22, 16);
  g.clear();
  g.fillStyle(0x46d6c9);
  g.fillTriangle(10, 2, 19, 9, 10, 9);
  g.fillTriangle(10, 2, 1, 9, 10, 9);
  g.fillStyle(0x2fa89d);
  g.fillTriangle(1, 9, 19, 9, 10, 18);
  g.generateTexture('item-gem', 20, 20);
  g.clear();
  g.fillStyle(0xffd23f);                              // the Sky Star
  g.fillPoints(Array.from({ length: 10 }, (_, i) => {
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const r = i % 2 ? 4 : 9;
    return { x: 10 + Math.cos(a) * r, y: 10 + Math.sin(a) * r };
  }), true);
  g.fillStyle(0xfff3b0); g.fillCircle(8, 7, 1.6);     // a glint
  g.generateTexture('item-star', 20, 20);
  g.clear();
